{% extends "base.html" %}{% block title %}Edit Employee{% endblock %}{% block header_title %}Edit Employee{% endblock %}{% block content %}<div class="glass section-card"><form method="post" class="form-grid"><div><label>Name</label><input class="glass-input" name="name" value="{{ item.name }}"></div><div><label>Employee Code</label><input class="glass-input" name="employee_code" value="{{ item.employee_code }}"></div><div><label>Gender</label><select class="glass-input" name="gender">{% for option in dropdowns.gender %}<option value="{{ option }}" {% if item.gender==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Designation</label><select class="glass-input" name="designation">{% for option in dropdowns.designation %}<option value="{{ option }}" {% if item.designation==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div class="full"><label>Team</label><select class="glass-input" name="team_id">{% for team in teams %}<option value="{{ team.id }}" {% if item.team_id==team.id %}selected{% endif %}>{{ team.team_name }}</option>{% endfor %}</select></div><div class="full actions-row"><button class="btn btn-primary" type="submit">Save</button></div></form></div>{% endblock %}
