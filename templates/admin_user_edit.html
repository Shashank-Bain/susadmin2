{% extends "base.html" %}{% block title %}Edit User{% endblock %}{% block header_title %}Edit User{% endblock %}{% block content %}<div class="glass section-card"><form method="post" class="form-grid"><div><label>First Name</label><input class="glass-input" name="first_name" value="{{ item.first_name }}"></div><div><label>Last Name</label><input class="glass-input" name="last_name" value="{{ item.last_name }}"></div><div class="full"><label>Email</label><input class="glass-input" name="email" value="{{ item.email }}"></div><div><label>Password</label><input class="glass-input" name="password" placeholder="Leave blank to keep existing"></div><div><label>Role</label><select class="glass-input" name="role"><option value="ADMIN" {% if item.role=='ADMIN' %}selected{% endif %}>ADMIN</option><option value="DIRECTOR" {% if item.role=='DIRECTOR' %}selected{% endif %}>DIRECTOR</option><option value="MANAGER" {% if item.role=='MANAGER' %}selected{% endif %}>MANAGER</option></select></div><div class="full actions-row"><button class="btn btn-primary" type="submit">Save</button></div></form></div>{% endblock %}
