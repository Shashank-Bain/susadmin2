{% extends "base.html" %}{% block title %}Edit Project{% endblock %}{% block header_title %}Edit Project{% endblock %}{% block content %}<div class="glass section-card"><form method="post" class="form-grid"><div><label>Project Name</label><input class="glass-input" name="project_name" value="{{ item.project_name }}"></div><div><label>Project Type</label><select class="glass-input" name="project_type">{% for option in dropdowns.project_type %}<option value="{{ option }}" {% if item.project_type==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Type for Util</label><select class="glass-input" name="type_for_util">{% for option in dropdowns.type_for_util %}<option value="{{ option }}" {% if item.type_for_util==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Billing Case Code</label><input class="glass-input" name="billing_case_code" value="{{ item.billing_case_code }}"></div><div><label>Client Case Code</label><input class="glass-input" name="client_case_code" value="{{ item.client_case_code }}"></div><div><label>Product</label><select class="glass-input" name="product">{% for option in dropdowns.product %}<option value="{{ option }}" {% if item.product==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Requestor</label><input class="glass-input" name="requestor" value="{{ item.requestor }}"></div><div><label>NPS Contact</label><input class="glass-input" name="nps_contact" value="{{ item.nps_contact }}"></div><div><label>Case Manager for NPS</label><select class="glass-input" name="case_manager_for_nps"><option value="">Select user</option>{% for user in users %}{% set uname = user.first_name ~ ' ' ~ user.last_name %}<option value="{{ uname }}" {% if item.case_manager_for_nps==uname %}selected{% endif %}>{{ uname }}</option>{% endfor %}</select></div><div class="full"><label>Work Description</label><textarea class="glass-input textarea-input" name="work_description">{{ item.work_description }}</textarea></div><div class="full"><label>Team</label><select class="glass-input" name="team_id">{% for team in teams %}<option value="{{ team.id }}" {% if item.team_id==team.id %}selected{% endif %}>{{ team.team_name }}</option>{% endfor %}</select></div><div class="full actions-row"><button class="btn btn-primary" type="submit">Save</button></div></form></div>{% endblock %}
