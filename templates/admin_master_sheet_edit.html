{% extends "base.html" %}
{% block title %}Edit Master Sheet Entry{% endblock %}
{% block header_title %}Edit Master Sheet Entry{% endblock %}
{% block content %}
<div class="glass section-card">
  <form method="post" class="form-grid">
    <div><label>Date</label><input class="glass-input" type="date" name="date" value="{{ item.date }}"></div>
    <div><label>Manager</label><select class="glass-input" name="manager_id">{% for u in users if u.role == 'MANAGER' %}<option value="{{ u.id }}" {% if item.manager_id==u.id %}selected{% endif %}>{{ u.first_name }} {{ u.last_name }}</option>{% endfor %}</select></div>
    <div><label>Employee</label><select class="glass-input" name="employee_id">{% for e in employees %}<option value="{{ e.id }}" {% if item.employee_id==e.id %}selected{% endif %}>{{ e.name }}</option>{% endfor %}</select></div>
    <div><label>Project</label><select class="glass-input" name="project_id"><option value="">Select project</option>{% for p in projects %}<option value="{{ p.id }}" {% if item.project_id==p.id %}selected{% endif %}>{{ p.project_name }}</option>{% endfor %}</select></div>
    <div><label>Staffing Type</label><select class="glass-input" name="staffing_type">{% for s in staffing_options %}<option value="{{ s }}" {% if item.staffing_type==s %}selected{% endif %}>{{ s }}</option>{% endfor %}</select></div>
    <div><label>Case Code</label><input class="glass-input" name="case_code" value="{{ item.case_code }}"></div>
    <div><label>Hours</label><input class="glass-input" type="number" step="0.5" name="hours" value="{{ item.hours }}"></div>
    <div class="full"><label>Comments</label><input class="glass-input" name="comments" value="{{ item.comments }}"></div>
    <div class="full actions-row"><button class="btn btn-primary" type="submit">Save</button></div>
  </form>
</div>
{% endblock %}
