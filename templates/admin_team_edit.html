{% extends "base.html" %}{% block title %}Edit Team{% endblock %}{% block header_title %}Edit Team{% endblock %}{% block content %}<div class="glass section-card"><form method="post" class="form-grid"><div><label>Team Name</label><input class="glass-input" name="team_name" value="{{ item.team_name }}"></div><div><label>Team Type</label><select class="glass-input multi-select" name="team_type" multiple size="4">{% for option in dropdowns.team_type %}<option value="{{ option }}" {% if option in (item.team_type or []) %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Classification Main</label><select class="glass-input" name="team_classification_main">{% for option in dropdowns.team_classification_main %}<option value="{{ option }}" {% if item.team_classification_main==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Classification 1</label><select class="glass-input" name="team_classification_1">{% for option in dropdowns.team_classification_1 %}<option value="{{ option }}" {% if item.team_classification_1==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Classification 2</label><select class="glass-input" name="team_classification_2">{% for option in dropdowns.team_classification_2 %}<option value="{{ option }}" {% if item.team_classification_2==option %}selected{% endif %}>{{ option }}</option>{% endfor %}</select></div><div><label>Manager</label><select class="glass-input" name="manager_id">{% for manager in managers %}<option value="{{ manager.id }}" {% if item.manager_id==manager.id %}selected{% endif %}>{{ manager.first_name }} {{ manager.last_name }}</option>{% endfor %}</select></div><div class="full"><label>Ombudsperson</label><select class="glass-input" name="ombudsperson_employee_id"><option value="">Select employee</option>{% for employee in employees %}<option value="{{ employee.id }}" {% if item.ombudsperson_employee_id==employee.id %}selected{% endif %}>{{ employee.name }}</option>{% endfor %}</select></div><div class="full actions-row"><button class="btn btn-primary" type="submit">Save</button></div></form></div>{% endblock %}
